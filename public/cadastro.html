<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/styles-c.css">
</head>

<body>
    <div class="container">
        <div class="content-c">
            <div class="cabecalho">
                <div class="logo">
                    <a href="index.html">
                        <h1>Cherish.</h1><img src="assets/img/logo/logo-def.png" alt="logo">
                    </a>
                </div>
                <div class="cabecalho-sub">
                    <span>Já tem uma conta? <a href="login.html"> Entre por Aqui!</a></span>
                    <br>
                </div>
            </div>
            <div class="container-form">
                <div class="box-c">
                    <h3>Cadastro</h3>
                    <div class="form-c">
                        <div class="input-c">
                            <input type="text" id="ipt_nome" placeholder="Nome">
                        </div>
                        <div class="input-c">
                            <input type="text" id="ipt_email" placeholder="E-mail">
                        </div>
                        <div class="input-c">
                            <input type="password" id="ipt_senha" placeholder="Senha">
                        </div>
                        <div class="input-c">
                            <input type="password" id="ipt_conf_senha" placeholder="Confirme sua senha">
                        </div>
                        <div class="c-button">
                            <button onclick="cadastrar()">Cadastrar</button>
                        </div>
                    </div>
                </div>
                <div id="exibir"></div>
            </div>
        </div>
    </div>
</body>

</html>
<script>

    function cadastrar() {
        let nome = ipt_nome.value;
        let email = ipt_email.value;
        let senha = ipt_senha.value;
        let confSenha = ipt_conf_senha.value;

        let mensagem = ``;

        if (!nome || !email || !senha || !confSenha) {
            mensagem = `<p class="exibir erro">Por favor, preencha todos os campos!</p>`;
            exibir.innerHTML = mensagem;
            return;
        } if (!email.includes('.com') || !email.includes('@')) {
            mensagem = `<p class="exibir erro">O Email deve conter "@" e ".com"</p>`;
            exibir.innerHTML = mensagem;
            return;
        } if (confSenha != senha){
            mensagem = `<p class="exibir erro">Os campos de senha devem ser iguais.</p>`;
            exibir.innerHTML = mensagem;
            return;
        }

        fetch("http://localhost:3000/usuarios/cadastrar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nome: nome,
                    email: email,
                    senha: senha
                })
            })
            .then(function(resposta){
                if (resposta.ok) {
                resposta.json().then(function(dados) {
                    mensagem = `<p class="exibir sucesso">Cadastro Realizado! 
                    <br> Redirecionando...</p>`;
                exibir.innerHTML = mensagem;

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1000);
            });

            } else {
                mensagem = `<p class="exibir erro">Erro ao Cadastrar!</p>`;
                exibir.innerHTML = mensagem;

                setTimeout(() => {
                    exibir.style.display = "none"
                }, 1000);
            }
            })
        .catch (function(erro) {
            alert("Erro ao conectar com o Servidor!")
            console.log(erro);
        }); 

    }
</script>
