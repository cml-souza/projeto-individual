<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Pessoal</title>
    <link rel="stylesheet" href="css/styles-g.css">
</head>

<body>
    <div class="container">
        <div class="content-h">
            <div class="header">
                <div class="nav-side">
                <h2>Momentos</h2>
                <a href="dashboard.html">
                    <h3>Dashboard</h3>
                </a>
                <a href="#">
                    <h3>Favoritos</h3>
                </a>
                <a href="index.html">
                    <h3>Sair</h3>
                </a>
                <div class="btn-adicionar">
                    <button id="btnAdd-m">+ Adicionar Momento</button>
                </div>
            </div>
            </div>
        </div>

        <div class="main-content">

            <div id="galeria" class="galeria"></div>
        </div>
    </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Novo Momento</h2>

            <div id="alerta" class="exibir"></div>

            <input type="text" id="titulo" placeholder="Título">

            <label for="imagem">Upload a Moment</label>
            <input type="file" id="imagem" accept="image/*">

            <label for="musica">Upload a song!</label>
            <input type="file" id="musica" accept=".mp3,audio/mpeg">

            <textarea id="descricao" placeholder="Descrição"></textarea>

            <label>
                Favoritar ⭐
                <input type="checkbox" id="favoritar">
            </label>

            <div class="modal-buttons">
                <button id="save">Salvar</button>
                <button id="cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let idEditando = null;
        const btn = document.getElementById("btnAdd-m");
        const modal = document.getElementById("modal");
        
        const usuarioId = sessionStorage.getItem("ID_USUARIO");
        console.log(usuarioId);

        const salvar = document.getElementById("save");
        const cancelar = document.getElementById("cancel");

        const galeria = document.getElementById("galeria");

        // Abrir Modal
        btn.onclick = () => {
            // Reset modo Edição
            idEditando = null;

            // Limpando os campos
            document.getElementById("titulo").value = "";
            document.getElementById("imagem").value = "";
            document.getElementById("descricao").value = "";
            document.getElementById("favoritar").checked = false;

            // Limpa Alerta
            const alerta = document.getElementById("alerta");
            alerta.style.display = "none";

            // Abre Modal
            modal.style.display = "flex";
        }

        // Fechar Modal
        cancelar.onclick = () => {
            modal.style.display = "none";
        }

        // Mostrar Alerta 
        function mostrarAlerta(texto, tipo) {
            const alerta = document.getElementById("alerta");

            alerta.innerText = texto;
            alerta.classList.remove("sucesso", "erro");
            alerta.classList.add(tipo);

            alerta.style.display = "flex";

            // Limpando Alerta
            setTimeout(() => {
                alerta.style.display = "none";
            }, 3000);
        }

        function tocarMusica(id) {
            const audio = document.getElementById(`audio-${id}`);

            const botao =
                event.target;

            if (audio.paused) {

                audio.play();

                botao.innerText = "⏸";

            } else {

                audio.pause();

                botao.innerText = "▶";

            }
            audio.onended = () => {

                botao.innerText = "▶";
            };
        }

        // Criar Card Momento
        function criarCard(
            id, 
            titulo, 
            imagem, 
            descricao, 
            favoritar,
            musica,
            musicaUrl) {
            return `
        <div class="card">

            <span style="margin-top:10px;">${titulo}</span>

            <img src="${imagem}">

            ${musicaUrl ? `
        <div class="musica-box">

            <button
                class="btn-play"
                onclick="tocarMusica(${id})"
            >
                ▶
            </button>

            <span>
                ${
                musica
                ? musica
                .replace(".mp3", "")
                .replace(/^\d+-/, "")
                .replaceAll("-", " ")
                .replaceAll("_", " ")
                : "Sem música"
                }
            </span>

            <audio id="audio-${id}">
                <source
                    src="${musicaUrl}"
                    type="audio/mpeg"
                >
            </audio>

        </div>
        ` : ""}

            <p style="padding: 0 10px;">${descricao}</p>

            ${favoritar ? "<p style='color: gold; text-align: center;'>Favoritar ⭐</p>" : "<p style='color: silver; text-align: center;'>Favoritar ☆"}    

        <div class="acoes">
            <button onclick="editarMomento(${id})">
                Editar
            </button>

            <button onclick="deletarMomento(${id})">
                Excluir
            </button>
        </div>
        </div>
        `;
        }

        function editarMomento(id) {
            idEditando = id;

            fetch(`/momentos/listar?usuario_id=${usuarioId}`)
            .then(function(resposta){
                return resposta.json();
            })

            .then(function(momentos){
                const momento = momentos.find(function(m){
                    return m.id == id;
                });

                document.getElementById("titulo").value =
                    momento.titulo;

                document.getElementById("descricao").value =
                    momento.descricao;

                document.getElementById("favoritar").checked =
                    momento.favoritar == 1;

                modal.style.display = "flex";
            })
            .catch (function(erro) {
                console.log(erro);
            });
            
        }

        function deletarMomento(id) {
            const confirmar = confirm("Deseja deletar esse Momento?")

            if(!confirmar) return;

            fetch(`/momentos/deletar/${id}`,
                    {
                        method: "DELETE"
                    })

                .then(function(resposta){
                    return resposta.json();
                })
                .then(function(dados) {
                    mostrarAlerta(dados.mensagem, "sucesso");

                    carregarMomento();
                })

                
            .catch (function(erro){
                console.log(erro);
                mostrarAlerta("Erro ao deletar: ", "erro");
            });
    }

        // Carregando Momentos Filtrados por usuário (GET)
        function carregarMomento() {
                // Log verificando se ele pega o ID corretamente pós login
                console.log("ID_USUARIO:", usuarioId);
                fetch(`http://localhost:3000/momentos/listar?usuario_id=${usuarioId}`)
                .then(function(resposta){
                    return resposta.json();
                })

                .then(function(momentos){
                    galeria.innerHTML = "";

                if (!Array.isArray(momentos)) {
                    console.log("Resposta inválida:", momentos);
                    return;
                }

                momentos.forEach(m => {
                    galeria.innerHTML += criarCard(
                        m.id,
                        m.titulo,
                        `/uploads/${m.imagem}`,
                        m.descricao,
                        m.favoritar == 1,
                        m.musica,
                        `/musicas/${m.musica}`
                    );
                });
                })
            .catch (function(erro) {
                console.log("Erro ao carregar momentos: ", erro)
            });
        }

        window.onload = carregarMomento;

        // Salvar Momento (POST)
        salvar.onclick = function() {
            const titulo = document.getElementById("titulo").value;
            const imagem = document.getElementById("imagem");
            const descricao = document.getElementById("descricao").value;
            const favoritar = document.getElementById("favoritar").checked;

            const arquivo = imagem.files[0];

            const musica = document.getElementById("musica");

            const arquivoMusica = musica 
            ? musica.files[0] :
            null;

            // Validando preenchimento de campos
            if (!titulo && !arquivo) {
                mostrarAlerta("Atribua um título ou uma imagem!", "erro");
                return;
            }

            const formData = new FormData();
            formData.append("usuario_id", usuarioId);
            formData.append("titulo", titulo);
            formData.append("imagem", arquivo);
            formData.append("descricao", descricao);
            formData.append("favoritar", favoritar ? 1 : 0);
            formData.append("musica", arquivoMusica);

            let req;

            if (idEditando) {
            req =  fetch(`/momentos/editar/${idEditando}`,
                {
                    method: "PUT",
                    body: formData
                }
            );
        } else {
            req = fetch(
                `/momentos/cadastrar`,
                {
                    method: "POST",
                    body: formData
                }
            );
        }

        req

        .then(function(resposta){
            return resposta.json();
        })
        .then(function(dados){
            console.log(dados);

            mostrarAlerta(dados.mensagem, "sucesso");

            carregarMomento();

            modal.style.display = "none";
        })

   // Tratando erro
        .catch (function(erro) {
             alert("Erro ao enviar para API", "erro");
             console.log(erro);
        });
        }

    </script>
</body>

</html>
