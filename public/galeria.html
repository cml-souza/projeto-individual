<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <link rel="stylesheet" href="css/styles-g.css">
</head>
<body>

    <div class="container">
        <div class="header-g">
            <h1>Seus Momentos</h1>

            <button class="add-btn" onclick="abrirUpload()">
                + Novo Momento
            </button>

            <input type="file" id="upload" accept="image/*" style="display: none;" onchange="adicionarCard(event)">
        </div>

        <div class="gallery" id="gallery"></div>

    </div>

    <script>
        function abrirUpload() {
            document.getElementById("upload").click();
        }

        function adicionarCard(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                const gallery = document.getElementById("gallery");

                gallery.innerHTML += `
                    <div class="card">
                        <img src="${e.target.result}">
                        <span>Novo momento</span>
                    </div>
                `;
            };

            reader.readAsDataURL(file);
        }
    </script>

</body>
</html>
