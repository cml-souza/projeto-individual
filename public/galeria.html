<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Pessoal</title>
    <link rel="stylesheet" href="css/styles-g.css">
</head>

<body>
    <div class="container">
        <div class="content-h">
            <div class="header">
                <div class="nav-side">
                <h2>Momentos</h2>
                <a href="dashboard.html">
                    <h3>Métricas</h3>
                </a>
                <a href="#">
                    <h3>Favoritos</h3>
                </a>
                <a href="index.html">
                    <h3>Sair</h3>
                </a>
                <div class="btn-adicionar">
                    <button id="btnAdd-m">+ Adicionar Momento</button>
                </div>
            </div>
            </div>
        </div>

        <div class="main-content">

            <div id="galeria" class="galeria"></div>
        </div>
    </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Novo Momento</h2>

            <div id="alerta" class="exibir"></div>

            <input type="text" id="titulo" placeholder="Título">

            <input type="file" id="imagem" accept="image/*">

            <textarea id="descricao" placeholder="Descrição"></textarea>

            <label>
                Favoritar ⭐
                <input type="checkbox" id="favoritar">
            </label>

            <div class="modal-buttons">
                <button id="save">Salvar</button>
                <button id="cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let idEditando = null;
        const btn = document.getElementById("btnAdd-m");
        const modal = document.getElementById("modal");
        
        const usuarioId = sessionStorage.getItem("ID_USUARIO");
        console.log(usuarioId);

        const salvar = document.getElementById("save");
        const cancelar = document.getElementById("cancel");

        const galeria = document.getElementById("galeria");

        // Abrir Modal
        btn.onclick = () => {
            // Reset modo Edição
            idEditando = null;

            // Limpando os campos
            document.getElementById("titulo").value = "";
            document.getElementById("imagem").value = "";
            document.getElementById("descricao").value = "";
            document.getElementById("favoritar").checked = false;

            // Limpa Alerta
            const alerta = document.getElementById("alerta");
            alerta.style.display = "none";

            // Abre Modal
            modal.style.display = "flex";
        }

        // Fechar Modal
        cancelar.onclick = () => {
            modal.style.display = "none";
        }

        // Mostrar Alerta 
        function mostrarAlerta(texto, tipo) {
            const alerta = document.getElementById("alerta");

            alerta.innerText = texto;
            alerta.classList.remove("sucesso", "erro");
            alerta.classList.add(tipo);

            alerta.style.display = "flex";

            // Limpando Alerta
            setTimeout(() => {
                alerta.style.display = "none";
            }, 3000);
        }

        // Criar Card Momento
        function criarCard(id, titulo, imagem, descricao, favoritar) {
            return `
        <div class="card">
            <span style="margin-top:10px;">${titulo}</span>
            <img src="${imagem}">
            <p style="padding: 0 10px;">${descricao}</p>
            ${favoritar ? "<p style='color: gold; text-align: center;'>Favoritar ⭐</p>" : "<p style='color: silver; text-align: center;'>Favoritar ☆"}    

         <div class="acoes">
            <button onclick="editarMomento(${id})">
                Editar
            </button>

            <button onclick="deletarMomento(${id})">
                Excluir
            </button>
        </div>
    </div>
        `;
        }

        async function editarMomento(id) {
            idEditando = id;

            try {
                const resposta = await fetch(
                    `/momentos/listar?usuario_id=${usuarioId}`
                );

                const momentos = await resposta.json();

                const momento = momentos.find(m => m.id == id);

                document.getElementById("titulo").value =
                    momento.titulo;

                document.getElementById("descricao").value =
                    momento.descricao;

                document.getElementById("favoritar").checked =
                    momento.favoritar == 1;

                modal.style.display = "flex";
            } catch (erro) {
                console.log(erro);
            }
            
        }

        async function deletarMomento(id) {
            const confirmar = confirm("Você tem certeza que deseja excluir esse Momento?")

            if(!confirmar) return;

            try {
                const resposta = await fetch(
                    `/momentos/deletar/${id}`,
                    {
                        method: "DELETE"
                    }
                );

                const dados = await resposta.json();

                mostrarAlerta(dados.mensagem, "sucesso");

                carregarMomento();
            }catch (erro) {
            console.log(erro);
            mostrarAlerta("Erro ao deletar: ", "erro");
        }
    }

        // Carregando Momentos Filtrados por usuário (GET)
        async function carregarMomento() {
            try {
                console.log("ID_USUARIO:", usuarioId);
                const resposta = await fetch(`http://localhost:3000/momentos/listar?usuario_id=${usuarioId}`);
                const momentos = await resposta.json();

                galeria.innerHTML = "";

                if (!Array.isArray(momentos)) {
                    console.log("Resposta inválida:", momentos);
                    return;
                }

                momentos.forEach(m => {
                    galeria.innerHTML += criarCard(
                        m.id,
                        m.titulo,
                        `/uploads/${m.imagem}`,
                        m.descricao,
                        m.favoritar == 1
                    );
                });

            }
            catch (erro) {
                console.log("Erro ao carregar momentos: ", erro)
            }
        }

        window.onload = carregarMomento;

        // Salvar Momento (POST)
        salvar.onclick = async () => {
            const titulo = document.getElementById("titulo").value;
            const imagem = document.getElementById("imagem");
            const descricao = document.getElementById("descricao").value;
            const favoritar = document.getElementById("favoritar").checked;

            const arquivo = imagem.files[0];

            // Validando preenchimento de campos
            if (!titulo && !arquivo) {
                mostrarAlerta("Atribua um título ou uma imagem!", "erro");
                return;
            }

            const formData = new FormData();
            formData.append("usuario_id", usuarioId);
            formData.append("titulo", titulo);
            formData.append("imagem", arquivo);
            formData.append("descricao", descricao);
            formData.append("favoritar", favoritar ? 1 : 0);

            try {

                if (idEditando) {
            resposta = await fetch(
                `/momentos/editar/${idEditando}`,
                {
                    method: "PUT",
                    body: formData
                }
            );
        } else {
            resposta = await fetch(
                `/momentos/cadastrar`,
                {
                    method: "POST",
                    body: formData
                }
            );
        }

                const dados = await resposta.json();
                console.log(dados);

                mostrarAlerta(dados.mensagem, "sucesso");

                carregarMomento();
                modal.style.display = "none";

                // Tratando erro
            } catch (erro) {
                alert("Erro ao enviar para API", "erro")
            }
        }

    </script>
</body>

</html>
